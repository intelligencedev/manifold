services:

##########################
# Core services - Required
##########################

  manifold:
    build:
      context: .
      dockerfile: deploy/docker/cpu.Dockerfile
    container_name: agentd
    user: "0:0"
    ports:
      - "32180:32180"
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      LOG_PATH: ""
      SSL_CERT_DIR: /etc/ssl/certs:/caddy-local-ca
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
      - ./config.yaml:/app/config.yaml
      - ./.:/app/manifold
      - ${WORKDIR}:${WORKDIR}
      - /var/run/docker.sock:/var/run/docker.sock

  pg-manifold:
    build:
      context: .
      dockerfile: ./deploy/docker/postgres.Dockerfile
    container_name: postgres
    environment:
      POSTGRES_DB: manifold
      POSTGRES_USER: manifold
      POSTGRES_PASSWORD: manifold
    ports:
      - "5433:5432"
    volumes:
      - app_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manifold -d manifold"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

##############################
# Observability - Not required
##############################

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: manifold_clickhouse
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    container_name: manifold_otel_collector
    depends_on:
      - clickhouse
    volumes:
      - ./deploy/configs/otel/collector.yaml:/etc/otelcol/config.yaml:ro
      - ${OTEL_DOCKER_CONTAINER_LOG_DIR:-./tmp/otel/docker-containers}:/var/lib/docker/containers:ro
    command:
      - "--config=/etc/otelcol/config.yaml"
    ports:
      - "4417:4317"
      - "4418:4318"
      - "55679:55679"
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=file:/etc/otelcol/config.yaml"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

###############################################################################
# Authentication - Not required, disable auth in config.yaml to run without it
###############################################################################

  keycloak-db:
    image: postgres:15-alpine
    container_name: keycloak_manifold_db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.2
    container_name: keycloak_manifold
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Database configuration
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      # Proxy/hostname tuning for local dev
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      # Disable strict hostname checks so http://localhost works in dev
      KC_HOSTNAME_STRICT: "false"
    command: ["start-dev", "--import-realm"]
    ports:
      - "8083:8080" # Keycloak (host 8083 to avoid conflicts)
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./deploy/configs/keycloak:/opt/keycloak/data/import:ro
    restart: unless-stopped

volumes:
  app_pg_data:
  keycloak_db_data:
  keycloak_data:
  clickhouse_data:
  clickhouse_logs:
